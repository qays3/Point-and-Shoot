<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report — Point-and-Shoot</title>
    <link rel="icon" type="image/png" href="assets/imgs/logo/icon.png" />
    <link rel="stylesheet" href="assets/css/root.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/report.css" />
</head>
<body>
    <div id="app" class="report-layout">

        <div class="page-bg">
            <svg class="crosshair-svg" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="ch-outer-ring">
                    <circle cx="512" cy="512" r="440" stroke="#9333ea" stroke-width="3" stroke-dasharray="60 24" stroke-linecap="round"/>
                    <circle cx="512" cy="512" r="440" stroke="white" stroke-width="18" stroke-dasharray="120 168" stroke-linecap="butt"/>
                </g>
                <g class="ch-mid-ring">
                    <circle cx="512" cy="512" r="340" stroke="#9333ea" stroke-width="2.5" stroke-dasharray="40 18" stroke-linecap="round"/>
                    <circle cx="512" cy="512" r="340" stroke="white" stroke-width="14" stroke-dasharray="80 120" stroke-linecap="butt"/>
                </g>
                <g class="ch-inner-ring">
                    <circle cx="512" cy="512" r="220" stroke="#9333ea" stroke-width="2" stroke-dasharray="28 14"/>
                </g>
                <g class="ch-lock-ring">
                    <circle cx="512" cy="512" r="160" stroke="#ec4899" stroke-width="2.5" stroke-dasharray="80 300" stroke-linecap="round"/>
                </g>
                <g class="ch-crosshair" stroke="white" stroke-width="10" stroke-linecap="butt">
                    <line x1="512" y1="72"  x2="512" y2="180"/>
                    <line x1="512" y1="844" x2="512" y2="952"/>
                    <line x1="72"  y1="512" x2="180" y2="512"/>
                    <line x1="844" y1="512" x2="952" y2="512"/>
                </g>
                <g class="ch-crosshair" stroke="#9333ea" stroke-width="2.5" stroke-linecap="round">
                    <line x1="512" y1="210" x2="512" y2="310"/>
                    <line x1="512" y1="714" x2="512" y2="814"/>
                    <line x1="210" y1="512" x2="310" y2="512"/>
                    <line x1="714" y1="512" x2="814" y2="512"/>
                </g>
                <g class="ch-scan-line" stroke="#9333ea" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
                    <line x1="512" y1="512" x2="512" y2="90"/>
                    <line x1="512" y1="512" x2="680" y2="200"/>
                    <line x1="512" y1="512" x2="780" y2="340"/>
                    <line x1="512" y1="512" x2="820" y2="512"/>
                </g>
                <g class="ch-crosshair" stroke="#9333ea" stroke-width="2" stroke-linecap="round">
                    <line x1="570" y1="340" x2="590" y2="320"/>
                    <line x1="590" y1="340" x2="570" y2="320"/>
                    <line x1="620" y1="390" x2="640" y2="370"/>
                    <line x1="640" y1="390" x2="620" y2="370"/>
                    <line x1="390" y1="620" x2="410" y2="600"/>
                    <line x1="410" y1="620" x2="390" y2="600"/>
                    <line x1="340" y1="570" x2="360" y2="550"/>
                    <line x1="360" y1="570" x2="340" y2="550"/>
                    <line x1="570" y1="684" x2="590" y2="664"/>
                    <line x1="590" y1="684" x2="570" y2="664"/>
                    <line x1="640" y1="634" x2="660" y2="614"/>
                    <line x1="660" y1="634" x2="640" y2="614"/>
                </g>
                <rect class="ch-crosshair" x="476" y="476" width="72" height="72" rx="4" stroke="#9333ea" stroke-width="2.5" fill="none"/>
                <g class="ch-dot">
                    <circle cx="512" cy="512" r="16" fill="white"/>
                    <circle cx="512" cy="512" r="10" fill="#9333ea"/>
                    <circle cx="512" cy="512" r="4"  fill="white"/>
                </g>
                <g class="ch-star">
                    <line x1="512" y1="490" x2="512" y2="534" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="490" y1="512" x2="534" y2="512" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <line x1="496" y1="496" x2="528" y2="528" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="528" y1="496" x2="496" y2="528" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="512" cy="512" r="5" fill="#ec4899"/>
                    <circle cx="512" cy="490" r="2.5" fill="white"/>
                    <circle cx="512" cy="534" r="2.5" fill="white"/>
                    <circle cx="490" cy="512" r="2.5" fill="white"/>
                    <circle cx="534" cy="512" r="2.5" fill="white"/>
                    <circle cx="496" cy="496" r="2" fill="#ec4899"/>
                    <circle cx="528" cy="528" r="2" fill="#ec4899"/>
                    <circle cx="528" cy="496" r="2" fill="#ec4899"/>
                    <circle cx="496" cy="528" r="2" fill="#ec4899"/>
                </g>
                <g class="ch-crosshair" stroke="#9333ea" stroke-width="1.5" opacity="0.4">
                    <line x1="512" y1="400" x2="512" y2="420"/>
                    <line x1="512" y1="604" x2="512" y2="624"/>
                    <line x1="400" y1="512" x2="420" y2="512"/>
                    <line x1="604" y1="512" x2="624" y2="512"/>
                </g>
            </svg>
        </div>

        <nav class="navbar">
            <div class="navbar-brand">
                <div class="navbar-logo">
                    <img src="assets/imgs/logo/icon.png" alt="Point-and-Shoot" />
                </div>
                <span class="navbar-brand-name">Point-and-<span>Shoot</span></span>
            </div>
            <div class="navbar-nav">
                <button class="nav-link" onclick="location.href='/'">Home</button>
                <button class="nav-link" onclick="location.href='dashboard'">Dashboard</button>
                <button class="nav-link active">Report</button>
            </div>
        </nav>

        <main class="report-main">

            <div class="report-topbar">
                <div>
                    <h1 class="report-heading">Intelligence <span>Report</span></h1>
                    <div class="report-meta-row">
                        <div class="report-meta-item">
                            <span class="report-meta-label">Target</span>
                            <span class="report-meta-value" id="metaTarget">No scan data</span>
                        </div>
                        <div class="report-meta-item">
                            <span class="report-meta-label">Scan Date</span>
                            <span class="report-meta-value" id="metaDate">No scan data</span>
                        </div>
                        <div class="report-meta-item">
                            <span class="report-meta-label">Duration</span>
                            <span class="report-meta-value" id="metaDuration">No scan data</span>
                        </div>
                    </div>
                </div>
                <div class="report-actions">
                    <button class="btn btn-ghost btn-sm" id="btnExportJson">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export JSON
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="location.href='dashboard'">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        New Scan
                    </button>
                </div>
            </div>

            <div class="report-stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Findings</div>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">High</div>
                    <div class="stat-value high" id="statHigh">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Medium</div>
                    <div class="stat-value med" id="statMed">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Low</div>
                    <div class="stat-value low" id="statLow">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Engines Run</div>
                    <div class="stat-value good" id="statEngines">0</div>
                </div>
            </div>

            <div class="filter-bar">
                <span class="filter-bar-label">Filter</span>
                <button class="toggle-btn active" data-filter="all">All</button>
                <button class="toggle-btn" data-filter="high">High</button>
                <button class="toggle-btn" data-filter="med">Medium</button>
                <button class="toggle-btn" data-filter="low">Low</button>
            </div>

            <div class="findings-list" id="findingsList">
                <div class="report-empty">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="color:var(--neutral-slate-700); opacity:0.3;"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                    <p class="report-empty-text">No scan data. Run a scan from the Dashboard first.</p>
                    <button class="btn btn-primary btn-sm" onclick="location.href='dashboard'">Go to Dashboard</button>
                </div>
            </div>

        </main>
    </div>

    <script src="assets/js/models/scanModel.js"></script>
    <script src="assets/js/models/reportModel.js"></script>
    <script src="assets/js/views/reportView.js"></script>
    <script src="assets/js/controllers/reportController.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
